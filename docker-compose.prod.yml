# Production compose file used on the EC2 host.
# Pulls pre-built images from GHCR (built and tagged by GitHub Actions).
#
# Required env file at /srv/bizautomate/.env (see deploy/.env.production.example):
#   IMAGE_REGISTRY    e.g. ghcr.io/your-github-user
#   IMAGE_TAG         e.g. main or a git sha
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   JWT_SECRET, CLIENT_URL
#
# Usage on EC2:
#   cd /srv/bizautomate
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [bizautomate]

  server:
    image: ${IMAGE_REGISTRY}/bizautomate-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    networks: [bizautomate]

  client:
    image: ${IMAGE_REGISTRY}/bizautomate-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 64M
    networks: [bizautomate]

volumes:
  pgdata:
  uploads:

networks:
  bizautomate:
    driver: bridge
