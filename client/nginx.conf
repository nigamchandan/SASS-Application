# Nginx vhost for the BizAutomate React SPA.
# Serves the Vite build at /, proxies /api/* and /uploads/* to the Node container.

# Compression for text-y assets
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
  application/javascript
  application/json
  application/xml
  font/eot
  font/otf
  font/ttf
  image/svg+xml
  text/css
  text/plain;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Generous body size for logo upload (we cap to 2 MB in app, allow some slack)
    client_max_body_size 5m;

    # Security-leaning headers (kept conservative — no HSTS yet since plain HTTP)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Lightweight self-healthcheck
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Proxy API + static uploads to the Node service over the docker network.
    # The 'server' hostname is the docker-compose service name.
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed assets — long cache (Vite output is content-hashed)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown route renders index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
